<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Vogelverkenner</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4683a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vogelverkenner">
  <!-- Icons (maak aan: icons/icon-192.png en icons/icon-512.png) -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    /* ── reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(150deg, #fef6e4 0%, #fdebd0 50%, #fce4c8 100%);
      padding-top:    env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left:   env(safe-area-inset-left);
      padding-right:  env(safe-area-inset-right);
    }

    /* ── screens ─────────────────────────────────────────────── */
    .screen {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .22s;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* ══════════════════════════════════════════════════════════
       SETUP SCREEN
    ══════════════════════════════════════════════════════════ */
    .setup-box {
      background: linear-gradient(170deg, #fef6e4 0%, #ffffff 55%, #fdebd0 100%);
      border-radius: 24px;
      padding: 28px 32px;
      box-shadow: 0 10px 40px rgba(120,70,20,.2), 0 2px 8px rgba(0,0,0,.08);
      width: min(520px, 94vw);
      max-height: 92vh;
      overflow-y: auto;
      scrollbar-width: thin;
      border: 2px solid rgba(255,255,255,.6);
    }

    .setup-title {
      color: #8a3a10; font-size: 1.65em;
      text-align: center; margin-bottom: 3px;
    }
    .setup-subtitle {
      color: #7a5c3a; text-align: center;
      font-size: 0.86em; margin-bottom: 22px;
    }

    .section-label {
      font-size: 0.78em; font-weight: 700; color: #8a6030;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 9px;
    }

    /* ── country grid ── */
    .country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 6px;
      margin-bottom: 22px;
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      padding-right: 2px;
    }

    .country-btn {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; padding: 8px 4px;
      border: 2px solid #e8c89a;
      border-radius: 12px; background: white;
      cursor: pointer; transition: all .18s;
      font-size: 0.78em; text-align: center; line-height: 1.2;
      min-height: 60px;
    }
    .country-btn .flag { font-size: 1.7em; line-height: 1; }
    .country-btn .cname { color: #7a5c3a; }

    .country-btn.active {
      border-color: #d4683a; background: #fef0e4;
      box-shadow: 0 0 0 2px #d4683a;
    }
    .country-btn.active .cname { color: #8a3a10; font-weight: 700; }

    .country-btn.unavailable {
      opacity: .3; cursor: not-allowed;
      background: #f5f5f5;
    }

    /* ── player count ── */
    .count-row {
      display: flex; gap: 9px;
      justify-content: center; margin-bottom: 18px;
    }
    .count-btn {
      width: 44px; height: 44px;
      border: 2px solid #e8c89a; border-radius: 50%;
      background: white; font-size: 1.05em; color: #7a5c3a;
      cursor: pointer; transition: all .16s;
    }
    .count-btn.active {
      border-color: #d4683a; background: #d4683a; color: white;
      box-shadow: 0 2px 8px rgba(212,104,58,.4);
    }

    /* ── name inputs ── */
    .player-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
    .player-row { display: flex; align-items: center; gap: 10px; }
    .player-row label {
      width: 96px; flex-shrink: 0;
      font-size: 0.82em; font-weight: 600; color: #7a5c3a;
    }
    .player-row input {
      flex: 1; padding: 7px 11px;
      border: 1.5px solid #e8c89a; border-radius: 8px;
      font-size: 0.91em; outline: none; transition: border-color .14s;
    }
    .player-row input:focus { border-color: #d4683a; }

    /* ── beurtwissel ── */
    #turn-mode-block { margin-bottom: 22px; }
    .turn-options { display: flex; flex-direction: column; gap: 7px; }
    .turn-option {
      display: flex; align-items: baseline; gap: 8px;
      padding: 8px 12px; cursor: pointer;
      border: 1.5px solid #e8c89a; border-radius: 10px;
      background: white; transition: all .16s;
      flex-wrap: wrap;
    }
    .turn-option:has(input:checked) {
      border-color: #d4683a; background: #fef0e4;
    }
    .turn-option input { accent-color: #d4683a; cursor: pointer; }
    .turn-title { font-size: 0.9em; font-weight: 600; color: #7a5c3a; }
    .turn-option:has(input:checked) .turn-title { color: #8a3a10; }
    .turn-desc { font-size: 0.78em; font-style: italic; color: #9a8060; }

    .start-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #d4683a, #a03018);
      color: white; font-weight: 700;
      border: none; border-radius: 14px;
      font-size: 1.05em; cursor: pointer;
      transition: all .18s;
      box-shadow: 0 4px 12px rgba(160,48,24,.3);
    }
    .start-btn:hover { background: linear-gradient(135deg, #c85a2e, #8a2810); transform: translateY(-1px); }

    /* ══════════════════════════════════════════════════════════
       GAME SCREEN
    ══════════════════════════════════════════════════════════ */
    #game-screen { flex-direction: column; align-items: stretch; }

    .scorebar {
      flex-shrink: 0;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 6px 14px; gap: 8px;
      background: linear-gradient(90deg, rgba(254,246,228,.9), rgba(253,235,208,.9));
      backdrop-filter: blur(6px);
      border-bottom: 2px solid rgba(212,104,58,.2);
      flex-wrap: nowrap; overflow: hidden;
    }

    #scores { display: flex; gap: 8px; flex-wrap: wrap; }

    .player-score {
      display: flex; flex-direction: column; align-items: center;
      padding: 4px 14px; border-radius: 20px;
      background: rgba(255,255,255,.7);
      border: 2px solid #e8c89a;
      transition: all .26s; min-width: 66px;
    }
    .player-score.active {
      background: linear-gradient(135deg, #d4683a, #a03018); color: white;
      border-color: #8a3a10;
      box-shadow: 0 2px 10px rgba(212,104,58,.45);
    }
    .player-score .p-name  { font-size: 0.74em; font-weight: 600; white-space: nowrap; }
    .player-score .p-score { font-size: 1.2em; font-weight: 700; }

    .scorebar-right { display: flex; align-items: center; gap: 10px; }
    #pairs-left { font-size: 0.82em; color: #7a5c3a; display: inline-flex; align-items: center; }
    .menu-btn {
      padding: 5px 13px; border-radius: 16px;
      border: none; background: #fef0e4; color: #8a3a10;
      cursor: pointer; font-size: 0.83em; font-weight: 600;
      transition: all .16s; line-height: 1; vertical-align: middle;
    }
    .menu-btn:hover { background: #fde0c8; }

    .grid-wrapper {
      flex: 1; overflow: hidden;
      padding: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 6px;
      width: 100%; height: 100%;
      max-width: 1100px;
    }

    /* ── cards ──────────────────────────────────────────────── */
    .card { cursor: pointer; perspective: 900px; user-select: none; }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .42s cubic-bezier(.4,0,.2,1);
      border-radius: 10px;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 3px 12px rgba(120,70,20,.22);
    }

    .card-back {
      background: linear-gradient(160deg, #fef6e4 0%, #fdebd0 100%);
      overflow: hidden;
    }
    .card-back svg {
      width: 100%; height: 100%; display: block;
    }

    .card-front {
      transform: rotateY(180deg);
      display: flex; flex-direction: column; align-items: center;
    }

    .image-card img {
      flex: 1; width: 100%; object-fit: cover; min-height: 0;
      transition: opacity .3s;
    }
    .image-card img.loading { opacity: 0; }
    .image-card img.loaded  { opacity: 1; }
    .image-card .no-img {
      flex: 1; width: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1.5em, 3vw, 2.5em);
    }

    .card-label {
      width: 100%; padding: 5px 4px; flex-shrink: 0;
      text-align: center; font-weight: 700;
      font-size: clamp(0.58em, 1.1vw, 0.82em);
      background: rgba(138,96,48,.12); color: #5a3810;
    }

    .sound-card { justify-content: flex-end; }
    .sound-card .speaker {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
      padding: 4px;
    }
    .sound-card .speaker svg { display: block; }
    .sound-card.playing .speaker { transform: scale(1.1); }

    @keyframes cardPop {
      0%   { transform: rotateY(180deg) scale(1);    opacity: 1; }
      40%  { transform: rotateY(180deg) scale(1.07); opacity: 1; }
      100% { transform: rotateY(180deg) scale(0);    opacity: 0; }
    }
    .card.disappearing .card-inner { animation: cardPop .5s ease-in forwards; }
    .card.gone { visibility: hidden; cursor: default; }

    /* ══════════════════════════════════════════════════════════
       PAUSE OVERLAY  (sits on top of game screen)
    ══════════════════════════════════════════════════════════ */
    #pause-overlay {
      position: absolute; inset: 0;
      background: rgba(60,35,10,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 5;
      transition: opacity .2s;
    }
    #pause-overlay.hidden { opacity: 0; pointer-events: none; }

    #credits-overlay {
      position: fixed; inset: 0;
      background: rgba(60,35,10,.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 20;
      transition: opacity .2s;
    }
    #credits-overlay.hidden { opacity: 0; pointer-events: none; }
    #credits-box {
      background: linear-gradient(170deg, #fef6e4, #fffdf8);
      border-radius: 18px;
      border: 1.5px solid #e8c89a;
      width: min(680px, 94vw);
      max-height: 80vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #credits-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e8c89a;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    #credits-header h2 { margin: 0; font-size: 1rem; color: #5a3810; }
    #credits-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; color: #8a6030; line-height: 1;
      padding: 2px 6px; border-radius: 8px;
    }
    #credits-close:hover { background: #fde0c8; }
    #credits-body { overflow-y: auto; padding: 14px 20px 20px; }
    .cr-bird { margin-bottom: 16px; }
    .cr-bird-name {
      font-size: 0.82rem; font-weight: 700; color: #8a3a10;
      text-transform: capitalize; margin-bottom: 4px;
      border-bottom: 1px solid #f0d5b0; padding-bottom: 2px;
    }
    .cr-item {
      font-size: 0.75rem; color: #5a3810;
      display: flex; gap: 6px; align-items: baseline;
      line-height: 1.5; padding: 1px 0;
    }
    .cr-item .cr-type { color: #a07840; flex-shrink: 0; min-width: 20px; }
    .cr-item a { color: #d4683a; text-decoration: none; }
    .cr-item a:hover { text-decoration: underline; }
    .cr-lic {
      background: #f5e8d5; color: #7a4820;
      font-size: 0.68rem; padding: 1px 5px; border-radius: 4px;
      flex-shrink: 0;
    }
    .credits-btn {
      padding: 5px 13px; border-radius: 16px;
      border: none; background: transparent; color: #7a5c3a;
      cursor: pointer; font-size: 0.83em; font-weight: 600;
      transition: all .16s; line-height: 1; vertical-align: middle;
    }
    .credits-btn:hover { background: #fde0c8; }

    .pause-box {
      background: linear-gradient(170deg, #fef6e4, #ffffff, #fdebd0);
      border-radius: 22px;
      padding: 34px 44px; text-align: center;
      box-shadow: 0 12px 40px rgba(120,70,20,.3);
      min-width: 240px;
      border: 2px solid rgba(255,255,255,.6);
    }
    .pause-box h2 { font-size: 1.5em; color: #8a3a10; margin-bottom: 6px; }
    .pause-box p  { color: #7a5c3a; font-size: 0.88em; margin-bottom: 24px; }

    .pause-btns { display: flex; flex-direction: column; gap: 10px; }
    .pause-btn {
      padding: 11px 20px; border: none; border-radius: 12px;
      font-size: 0.97em; font-weight: 600; cursor: pointer; transition: all .16s;
    }
    .pause-btn.primary   { background: linear-gradient(135deg, #6a9a40, #3a6a18); color: white; box-shadow: 0 2px 8px rgba(90,140,40,.3); }
    .pause-btn.primary:hover { transform: translateY(-1px); }
    .pause-btn.secondary { background: #fdebd0; color: #7a5c3a; }
    .pause-btn.secondary:hover { background: #fce4c8; }

    /* ══════════════════════════════════════════════════════════
       WIN SCREEN
    ══════════════════════════════════════════════════════════ */
    #win-screen { background: rgba(60,35,10,.5); z-index: 10; }

    .win-box {
      background: linear-gradient(170deg, #fef6e4, #ffffff, #fdebd0);
      border-radius: 24px;
      padding: 34px 46px; text-align: center;
      box-shadow: 0 14px 45px rgba(120,70,20,.35);
      max-width: 360px; width: 90vw;
      border: 2px solid rgba(255,255,255,.6);
    }
    .win-box h2 { font-size: 1.75em; color: #8a3a10; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .dance-bird { display: inline-block; animation: birdDance 0.7s ease-in-out infinite alternate; transform-origin: center bottom; }
    @keyframes birdDance {
      0%   { transform: translateY(0)    rotate(-8deg) scaleX(1); }
      30%  { transform: translateY(-14px) rotate(0deg)  scaleX(1); }
      60%  { transform: translateY(-6px)  rotate(6deg)  scaleX(1); }
      100% { transform: translateY(-18px) rotate(-4deg) scaleX(-1); }
    }

    .result-table {
      width: 100%; border-collapse: collapse; margin-bottom: 20px;
    }
    .result-table th {
      color: #8a6030; font-weight: 600; font-size: 0.8em;
      padding: 3px 10px; border-bottom: 2px solid #e8c89a;
    }
    .result-table td { padding: 7px 10px; font-size: 0.95em; color: #3a2010; }
    .result-table tr.winner td { font-weight: 700; color: #8a3a10; font-size: 1.05em; }

    .win-btns { display: flex; flex-direction: column; gap: 9px; }
    .win-btn {
      padding: 10px 28px; border: none; border-radius: 12px;
      font-size: 0.96em; font-weight: 600; cursor: pointer; transition: all .18s;
    }
    .win-btn.primary   { background: linear-gradient(135deg, #d4683a, #a03018); color: white; box-shadow: 0 3px 10px rgba(160,48,24,.3); }
    .win-btn.primary:hover { transform: translateY(-1px); }
    .win-btn.secondary { background: #fdebd0; color: #7a5c3a; }
    .win-btn.secondary:hover { background: #fce4c8; }
  </style>
</head>
<body>

<!-- ══ SETUP SCREEN ══════════════════════════════════════════ -->
<div id="setup-screen" class="screen">
  <div class="setup-box">
    <h1 class="setup-title">
      <svg viewBox="0 0 60 72" width="48" height="58" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:6px" class="logo-bird">
        <defs>
          <filter id="logo-enc" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" seed="5" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <g filter="url(#logo-enc)" transform="translate(30,36)">
          <!-- staart -->
          <path d="M-4,28 Q-8,44 -6,54" stroke="#7a6040" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".7"/>
          <path d="M0,28 Q0,44 2,54" stroke="#8a7050" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".5"/>
          <path d="M4,28 Q8,42 8,52" stroke="#9a8060" stroke-width="1.2" fill="none" stroke-linecap="round" opacity=".4"/>
          <!-- vleugel -->
          <path d="M-16,-4 Q-28,8 -24,26 Q-14,20 -2,16 Q6,12 4,-2 Z" fill="#8a7050" fill-opacity=".5" stroke="#6a5030" stroke-width="1.2"/>
          <line x1="-24" y1="22" x2="-10" y2="8" stroke="#9a8060" stroke-width="1" opacity=".45"/>
          <line x1="-18" y1="24" x2="-4" y2="10" stroke="#9a8060" stroke-width=".9" opacity=".4"/>
          <!-- lichaam -->
          <ellipse cx="2" cy="16" rx="16" ry="18" fill="#c8a878" fill-opacity=".55" stroke="#8a6840" stroke-width="1.2"/>
          <!-- borst oranje-rood -->
          <path d="M-6,-2 Q10,-6 14,8 Q12,22 2,26 Q-8,24 -10,14 Q-10,-2 -6,-2 Z" fill="#d4683a" fill-opacity=".65" stroke="#b04820" stroke-width="1"/>
          <!-- kop -->
          <circle cx="4" cy="-18" r="16" fill="#c8a878" fill-opacity=".6" stroke="#8a6840" stroke-width="1.2"/>
          <!-- oranje masker -->
          <path d="M-4,-32 Q14,-34 16,-20 Q14,-8 4,-6 Q-6,-6 -8,-18 Q-8,-30 -4,-32 Z" fill="#d4683a" fill-opacity=".6" stroke="#b04820" stroke-width=".9"/>
          <!-- oog -->
          <circle cx="8" cy="-20" r="5.5" fill="white" fill-opacity=".88" stroke="#6a4820" stroke-width="1"/>
          <circle cx="9" cy="-19.5" r="3.5" fill="#2a1a08" fill-opacity=".92"/>
          <circle cx="10" cy="-21" r="1.4" fill="white" fill-opacity=".95"/>
          <!-- snavel -->
          <path d="M14,-14 Q22,-10 22,-8 Q18,-4 14,-8 Z" fill="#8a6030" fill-opacity=".82" stroke="#6a4018" stroke-width=".9"/>
          <!-- pootjes -->
          <line x1="-4" y1="32" x2="-8" y2="42" stroke="#8a6840" stroke-width="2" stroke-linecap="round" opacity=".7"/>
          <line x1="6" y1="33" x2="4" y2="42" stroke="#8a6840" stroke-width="2" stroke-linecap="round" opacity=".7"/>
          <line x1="-8" y1="42" x2="-14" y2="48" stroke="#8a6840" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
          <line x1="-8" y1="42" x2="-2" y2="48" stroke="#8a6840" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
          <line x1="4" y1="42" x2="-2" y2="48" stroke="#8a6840" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
        </g>
      </svg>Vogelverkenner</h1>
    <p class="setup-subtitle">Welke vogel zingt zijn lied?</p>

    <!-- land-keuze tijdelijk verborgen; alleen NL actief -->
    <div id="country-grid" style="display:none"></div>

    <p class="section-label">Aantal deelnemers</p>
    <div class="count-row" id="count-row"></div>

    <p class="section-label" id="names-label">Namen</p>
    <div class="player-inputs" id="player-inputs"></div>

    <div id="turn-mode-block">
      <p class="section-label">Beurtwissel</p>
      <div class="turn-options">
        <label class="turn-option">
          <input type="radio" name="turn-mode" value="traditional" checked>
          <span class="turn-title">Traditioneel</span>
          <span class="turn-desc">nog een beurt na een goed paar</span>
        </label>
        <label class="turn-option">
          <input type="radio" name="turn-mode" value="alternate">
          <span class="turn-title">Om-en-om</span>
          <span class="turn-desc">altijd wisselen van beurt</span>
        </label>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">Spelen ▶</button>
  </div>
</div>

<!-- ══ GAME SCREEN ═══════════════════════════════════════════ -->
<div id="game-screen" class="screen hidden">
  <div class="scorebar">
    <div id="scores"></div>
    <span id="pairs-left"></span>
    <div class="scorebar-right">
      <button class="credits-btn" onclick="openCredits()">Credits</button>
      <button class="menu-btn" onclick="openPause()">☰ Menu</button>
    </div>
  </div>
  <div class="grid-wrapper">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Pause overlay — lives inside game screen so game stays rendered -->
  <div id="pause-overlay" class="hidden">
    <div class="pause-box">
      <h2>⏸ Gepauzeerd</h2>
      <p id="pause-info"></p>
      <div class="pause-btns">
        <button class="pause-btn primary"   onclick="closePause()">▶ Doorgaan</button>
        <button class="pause-btn secondary" onclick="goToSetup()">☰ Nieuw spel</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ WIN SCREEN ════════════════════════════════════════════ -->
<div id="win-screen" class="screen hidden">
  <div class="win-box">

let selectedCountry = COUNTRIES.find(c => c.id === "nederland");
let numPlayers = 1;

function initSetup() {
  buildCountryGrid();
  buildCountRow();
  renderPlayerInputs();
  document.getElementById("turn-mode-block").style.display = numPlayers > 1 ? "" : "none";
}

function buildCountryGrid() {
  const grid = document.getElementById("country-grid");
  grid.innerHTML = "";
  COUNTRIES.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "country-btn" +
      (c.active ? "" : " unavailable") +
      (c.id === selectedCountry.id ? " active" : "");
    btn.innerHTML = `<span class="flag">${c.flag}</span><span class="cname">${c.name}</span>`;
    btn.title = c.active ? c.name : `${c.name} (binnenkort beschikbaar)`;
    if (c.active) {
      btn.onclick = () => selectCountry(c);
    }
    grid.appendChild(btn);
  });
}

function selectCountry(c) {
  selectedCountry = c;
  buildCountryGrid();
  updateNamesLabel();
  renderPlayerInputs();
}

function buildCountRow() {
  const row = document.getElementById("count-row");
  row.innerHTML = "";
  [1,2,3,4,5].forEach(n => {
    const btn = document.createElement("button");
    btn.className = "count-btn" + (n === numPlayers ? " active" : "");
    btn.textContent = n;
    btn.onclick = () => selectCount(n);
    row.appendChild(btn);
  });
}

function selectCount(n) {
  numPlayers = n;
  document.querySelectorAll(".count-btn").forEach((b, i) =>
    b.classList.toggle("active", i + 1 === n)
  );
  renderPlayerInputs();
  // beurtwissel-keuze alleen relevant bij 2+ spelers
  document.getElementById("turn-mode-block").style.display = n > 1 ? "" : "none";
}

function participantWord() {
  return selectedCountry.participantWord || "Deelnemer";
}

function updateNamesLabel() {
  // Label above name inputs reflects the chosen country's word
}

function renderPlayerInputs() {
  const container = document.getElementById("player-inputs");
  const prev = Array.from(container.querySelectorAll("input")).map(i => i.value);
  container.innerHTML = "";
  const word = participantWord();
  for (let i = 0; i < numPlayers; i++) {
    const row = document.createElement("div");
    row.className = "player-row";
    const lbl = document.createElement("label");
    lbl.textContent = `${word} ${i + 1}`;
    const inp = document.createElement("input");
    inp.type = "text";
    inp.placeholder = `${word} ${i + 1}`;
    inp.value = prev[i] || "";
    row.appendChild(lbl);
    row.appendChild(inp);
    container.appendChild(row);
  }
}

/* ============================================================
   START / REPLAY
   ============================================================ */
function startGame() {
  const inputs = document.querySelectorAll("#player-inputs input");
  const word   = participantWord();
  players = Array.from(inputs).map((inp, i) => ({
    name:  inp.value.trim() || `${word} ${i + 1}`,
    score: 0
  }));
  turnMode = document.querySelector('input[name="turn-mode"]:checked')?.value || "traditional";
  launchGame();
}

function replayGame() {
  // Same players, reset scores
  players.forEach(p => p.score = 0);
  launchGame();
}

function launchGame() {
  currentIdx = 0;
  flipped    = [];
  locked     = false;
  paused     = false;

  // Haal de volledige catalogus op en filter op actieve vogels via curator-instellingen
  const allBirds   = selectedCountry.birds || [];
  const catalog    = loadCuratorState();
  const GAME_SIZE  = 15;

  let activeBirds;
  if (catalog) {
    // Pas curator-instellingen toe: filter uitgeschakelde vogels
    activeBirds = allBirds
      .filter(b => catalog[b.id]?.enabled !== false)
      .map(b => {
        const cs = catalog[b.id];
        if (!cs) return b;
        return {
          ...b,
          images: cs.images?.length ? cs.images : (b.images || [b.image]),
          sounds: cs.sounds?.length
            ? cs.sounds.map(s => s.file)
            : b.sounds,
          soundStarts: Object.fromEntries(
            (cs.sounds || []).map(s => [s.file, s.start || 0])
          ),
        };
      });
  } else {
    activeBirds = allBirds;
  }

  // Kies willekeurig GAME_SIZE vogels
  birdList = shuffle(activeBirds).slice(0, Math.min(GAME_SIZE, activeBirds.length));
  remainingPairs = birdList.length;

  stopAudio();
  document.getElementById("pause-overlay").classList.add("hidden");
  showScreen("game-screen");
  renderScores();
  buildGrid();
}

/* ============================================================
   GRID
   ============================================================ */
function buildGrid() {
  updatePairsLeft();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const cardData = [];
  birdList.forEach(bird => {
    // Willekeurig geluid kiezen
    const sound = bird.sounds[Math.floor(Math.random() * bird.sounds.length)];
    // Willekeurig plaatje kiezen (ondersteunt zowel bird.image als bird.images[])
    const imgPool = bird.images || [bird.image];
    const image   = imgPool[Math.floor(Math.random() * imgPool.length)];
    cardData.push({ type: "image", bird, image });
    cardData.push({ type: "sound", bird, sound });
  });

  shuffle(cardData).forEach(cd => grid.appendChild(makeCard(cd)));
}

function makeCard(cd) {
  const el = document.createElement("div");
  el.className        = "card";
  el.dataset.birdId   = cd.bird.id;
  el.dataset.type     = cd.type;
  if (cd.sound) {
    el.dataset.sound = cd.sound;
    if (cd.bird.soundStarts) el.dataset.soundStarts = JSON.stringify(cd.bird.soundStarts);
  }

  const back  = document.createElement("div");
  back.className  = "card-face card-back";
  back.innerHTML  = CARD_BACK_SVG;

  const front = document.createElement("div");
  front.className = `card-face card-front ${cd.type}-card`;
  front.style.backgroundColor = cd.bird.color;

  if (cd.type === "image") {
    const file = cd.image || cd.bird.image;
    const img = document.createElement("img");
    img.src       = WM_IMAGE + file;
    img.alt       = cd.bird.name;
    img.style.objectPosition = FOCAL_POINTS[file] || "50% 35%";
    img.className = "loading";
    img.addEventListener("load",  () => { img.className = "loaded"; });
    img.addEventListener("error", () => { img.replaceWith(makeFallback()); });
    front.appendChild(img);
    front.appendChild(makeLabel(cd.bird.name));
  } else {
    const spk = document.createElement("div");
    spk.className   = "speaker";
    spk.innerHTML = SOUND_ICON_SVG;
    front.appendChild(spk);
    front.appendChild(makeLabel(cd.bird.name));
  }

  const inner = document.createElement("div");
  inner.className = "card-inner";
  inner.appendChild(back);
  inner.appendChild(front);
  el.appendChild(inner);

  el.addEventListener("click", () => onCardClick(el));
  return el;
}

function makeLabel(text) {
  const d = document.createElement("div");
  d.className   = "card-label";
  d.textContent = text;
  return d;
}

function makeFallback() {
  const d = document.createElement("div");
  d.className   = "no-img";
  d.textContent = "🐦";
  return d;
}

/* ============================================================
   CARD CLICK
   ============================================================ */
function onCardClick(el) {
  if (locked || paused || el.classList.contains("gone")) return;

  // Re-click flipped sound card → replay audio
  if (el.classList.contains("flipped") && el.dataset.type === "sound") {
    playSound(el.dataset.sound, el, el.dataset.soundStarts ? JSON.parse(el.dataset.soundStarts) : null);
    return;
  }

  if (el.classList.contains("flipped") || el.classList.contains("matched")) return;
  if (flipped.length >= 2) return;

  el.classList.add("flipped");
  if (el.dataset.type === "sound") playSound(el.dataset.sound, el, el.dataset.soundStarts ? JSON.parse(el.dataset.soundStarts) : null);
  flipped.push(el);

  if (flipped.length === 2) {
    locked = true;
    // 420ms flip animation + 1000ms visible = 1420ms; use 1500 for comfort
    setTimeout(resolveFlipped, 3420); // 420ms flip-animatie + 3s kijktijd
  }
}

function resolveFlipped() {
  const [a, b] = flipped;
  flipped = [];

  if (a.dataset.birdId === b.dataset.birdId) {
    // ── MATCH ──
    players[currentIdx].score++;
    remainingPairs--;
    renderScores();
    updatePairsLeft();

    [a, b].forEach(el => {
      el.classList.add("matched", "disappearing");
      el.addEventListener("animationend", () => {
        el.classList.add("gone");
        el.classList.remove("disappearing");
      }, { once: true });
    });

    locked = false;
    if (remainingPairs === 0) setTimeout(showWin, 700);
    else if (turnMode === "alternate") advancePlayer();
    // traditioneel: zelfde speler blijft aan de beurt na een goed paar

  } else {
    // ── NO MATCH ──
    [a, b].forEach(el => {
      el.classList.remove("flipped");
      if (el.dataset.type === "sound")
        el.querySelector(".card-face.sound-card")?.classList.remove("playing");
    });
    advancePlayer();
    locked = false;
  }
}

/* ============================================================
   PLAYERS
   ============================================================ */
function advancePlayer() {
  if (players.length > 1) {
    currentIdx = (currentIdx + 1) % players.length;
    renderScores();
  }
}

function renderScores() {
  const container = document.getElementById("scores");
  container.innerHTML = "";
  players.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "player-score" + (i === currentIdx ? " active" : "");
    div.innerHTML =
      `<span class="p-name">${p.name}</span>` +
      `<span class="p-score">${p.score}</span>`;
    container.appendChild(div);
  });
}

function updatePairsLeft() {
  document.getElementById("pairs-left").textContent =
    remainingPairs === 1 ? "1 paar over" : `${remainingPairs} paren over`;
}

   PAUSE
   ============================================================ */
function openPause() {
  paused = true;
  const who = players[currentIdx]?.name || "";
  document.getElementById("pause-info").textContent =
    players.length > 1 ? `${who} is aan de beurt` : "";
  document.getElementById("pause-overlay").classList.remove("hidden");
}

function closePause() {
  paused = false;

function openCredits() {
  const body = document.getElementById("credits-body");
  if (!body.hasChildNodes()) {
    const BIRD_NAMES = {
      "merel":"Merel","koolmees":"Koolmees","roodborst":"Roodborst","kauw":"Kauw",
      "spreeuw":"Spreeuw","huismus":"Huismus","vink":"Vink","houtduif":"Houtduif",
      "pimpelmees":"Pimpelmees","tjiftjaf":"Tjiftjaf","winterkoning":"Winterkoning",
      "groenling":"Groenling","kievit":"Kievit","ekster":"Ekster","kraai":"Kraai",
      "gaai":"Gaai","wilde-eend":"Wilde eend","boerenzwaluw":"Boerenzwaluw",
      "gierzwaluw":"Gierzwaluw","koekoek":"Koekoek","nachtegaal":"Nachtegaal",
      "gr-bonte-specht":"Grote bonte specht"
    };
    let html = "";
    for (const [id, data] of Object.entries(CREDITS_NL)) {
      html += `<div class="cr-bird"><div class="cr-bird-name">${BIRD_NAMES[id] || id}</div>`;
      data.images.forEach(item => {
        const lic = item.license_url
          ? `<a href="${item.license_url}" target="_blank">${item.license}</a>`
          : item.license;
        html += `<div class="cr-item"><span class="cr-type">📷</span><span>${item.author} · ${lic} · <a href="${item.page_url}" target="_blank">Wikimedia</a></span></div>`;
      });
      data.sounds.forEach(item => {
        const lic = item.license_url
          ? `<a href="${item.license_url}" target="_blank">${item.license}</a>`
          : item.license;
        html += `<div class="cr-item"><span class="cr-type">🔊</span><span>${item.author} · ${lic} · <a href="${item.page_url}" target="_blank">Wikimedia</a></span></div>`;
      });
      html += `</div>`;
    }
    body.innerHTML = html;
  }
  document.getElementById("credits-overlay").classList.remove("hidden");
}

function closeCredits() {
  document.getElementById("credits-overlay").classList.add("hidden");
}

/* ============================================================
   AUDIO — Web Audio API
   • Fade-in  : 0.1 s via GainNode ramp
   • Normalisatie : RMS-analyse van het afspeelgedeelte
   • Fade-out : 1 s na 3 s via GainNode ramp
   ============================================================ */

const AUDIO_STARTS = {};

const TARGET_RMS  = 0.12;  // streefniveau (0–1)
const MAX_GAIN    = 10;    // maximale versterking
const FADE_IN_S   = 0.1;  // fade-in duur (seconden)
const FADE_OUT_S  = 1.0;  // fade-out duur
const PLAY_S      = 3.0;  // speelduur vóór fade-out

function rmsGain(buffer, startAt) {
  const sr    = buffer.sampleRate;
  const start = Math.floor(startAt * sr);
  const end   = Math.min(start + Math.floor((PLAY_S + FADE_OUT_S) * sr), buffer.length);
  let sumSq = 0, n = 0;
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const data = buffer.getChannelData(ch);
    for (let i = start; i < end; i++) { sumSq += data[i] ** 2; n++; }
  }
  const rms = n > 0 ? Math.sqrt(sumSq / n) : 0;
  return rms > 0 ? Math.min(TARGET_RMS / rms, MAX_GAIN) : 1;
}

async function playSound(filename, cardEl, birdSoundStarts) {
  stopAudio();

  const front = cardEl?.querySelector(".card-face.sound-card");
  if (front) { front.classList.add("playing"); activeFront = front; }

  const startAt = (birdSoundStarts?.[filename] != null)
    ? birdSoundStarts[filename]
    : (AUDIO_STARTS[filename] || 0);

  const url = WM_AUDIO + filename;
  const ctx = getAudioCtx();
  await ctx.resume();

  try {
    // Laad & cache gedecodeerde buffer
    if (!audioCache[url]) {
      const resp = await fetch(url, { mode: "cors" });
      const ab   = await resp.arrayBuffer();
      audioCache[url] = await ctx.decodeAudioData(ab);
    }
    const buffer = audioCache[url];
    const gain   = rmsGain(buffer, startAt);

    const source   = ctx.createBufferSource();
    source.buffer  = buffer;

    const fadeNode = ctx.createGain();
    fadeNode.gain.setValueAtTime(0, ctx.currentTime);
    fadeNode.gain.linearRampToValueAtTime(gain, ctx.currentTime + FADE_IN_S);
    source.connect(fadeNode);
    fadeNode.connect(ctx.destination);
    source.start(0, startAt);

    activeSource   = source;
    activeFadeGain = fadeNode;

    // Fade-out na PLAY_S seconden
    fadeTimerId = setTimeout(() => {
      const now = ctx.currentTime;
      fadeNode.gain.cancelScheduledValues(now);
      fadeNode.gain.setValueAtTime(fadeNode.gain.value, now);
      fadeNode.gain.linearRampToValueAtTime(0, now + FADE_OUT_S);
      setTimeout(() => {
        try { source.stop(); } catch (_) {}
        if (front) { front.classList.remove("playing"); activeFront = null; }
      }, (FADE_OUT_S + 0.1) * 1000);
    }, PLAY_S * 1000);

  } catch (err) {
    // Fallback: plain Audio als CORS of decode mislukt
    console.warn("Web Audio fallback:", err.message);
    const audio = new Audio(url);
    audio.volume = 0;
    if (startAt > 0) audio.addEventListener("canplay",
      () => { audio.currentTime = startAt; }, { once: true });
    audio.play().catch(() => {});
    // Fade-in
    let s = 0;
    const fi = setInterval(() => { audio.volume = Math.min(1, ++s / 10); if (s >= 10) clearInterval(fi); }, 10);
    audio.addEventListener("play", () => {
      fadeTimerId = setTimeout(() => {
        let step = 0, vol = audio.volume;
        const fo = setInterval(() => {
          audio.volume = Math.max(0, vol * (1 - ++step / 30));
          if (step >= 30) { clearInterval(fo); audio.pause(); front?.classList.remove("playing"); activeFront = null; }
        }, 33);
      }, PLAY_S * 1000);
    }, { once: true });
    activeAudio = audio;
  }
}

function stopAudio() {
  if (fadeTimerId) { clearTimeout(fadeTimerId); fadeTimerId = null; }
  if (activeSource) {
    try {
      activeFadeGain?.gain.cancelScheduledValues(audioCtx?.currentTime ?? 0);
      activeFadeGain?.gain.setValueAtTime(0, audioCtx?.currentTime ?? 0);
      activeSource.stop();
    } catch (_) {}
    activeSource = null; activeFadeGain = null;
  }
  if (activeAudio) { activeAudio.pause(); activeAudio = null; }
  if (activeFront) { activeFront.classList.remove("playing"); activeFront = null; }
}

function showWin() {
  stopAudio();
  const sorted   = [...players].sort((a, b) => b.score - a.score);
  const maxScore = sorted[0].score;
  const tbody    = document.getElementById("result-body");
  tbody.innerHTML = "";
  sorted.forEach((p, i) => {
    const tr = document.createElement("tr");
    if (i === 0 && players.length > 1) tr.className = "winner";
    tr.innerHTML =
      `<td>${i === 0 && players.length > 1 ? "🏆 " : ""}${p.name}</td>` +
      `<td>${p.score}</td>`;
    tbody.appendChild(tr);
  });
  showScreen("win-screen");
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
